<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitScope Profile Engine</title>
    <style>
        :root {
            --bg-main: #0B111E;
            --bg-card: #151C2C;
            --accent: #5865F2;
            --text-main: #E2E8F0;
            --text-muted: #7F8FA4;
            --error: #EF4444;
            --success: #10B981;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 900px; }
        h1 { text-align: center; color: #FFF; font-size: 2.5rem; margin-bottom: 5px; font-weight: 700; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; }
        
        .search-box {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 14px;
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border: 1px solid #222C3F;
        }
        input {
            flex: 1;
            background: #0B111E;
            border: 1px solid #222C3F;
            border-radius: 10px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; }

        .card, .table-container {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid #222C3F;
        }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px; border-bottom: 1px solid #222C3F; }
        th { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; }
        td { color: #E2E8F0; font-size: 0.95rem; }
        
        .badge { background: #1E293B; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #334155; font-weight: 600; text-transform: uppercase; }
        .badge.archetype { border-color: var(--accent); color: #FFF; }
        .error-box { color: var(--error); border: 1px solid var(--error); padding: 15px; border-radius: 10px; background: rgba(239, 68, 68, 0.08); text-align: center; margin-bottom: 20px; }
        .loading { text-align: center; color: var(--text-muted); padding: 30px; font-size: 1.1rem; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .metric-item { background: #0B111E; padding: 20px 15px; border-radius: 10px; text-align: center; border: 1px solid #222C3F; }
        .metric-item p { margin: 0 0 8px 0; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: 600; }
        .metric-item h3 { margin: 0; font-size: 1.75rem; color: #FFF; font-weight: 700; }
        
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); background: #0B111E; }
        
        .section-title { color: #FFF; font-size: 1.1rem; margin: 0 0 10px 0; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .info-block { background: #0B111E; padding: 20px; border-radius: 10px; border: 1px solid #222C3F; margin-top: 20px; }
        .info-block p { margin: 0 0 10px 0; font-size: 0.95rem; line-height: 1.5; }
        .info-block p:last-child { margin-bottom: 0; }
        ul { margin: 5px 0 0 0; padding-left: 20px; color: #E2E8F0; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>GitScope Profile Engine</h1>
    <p class="subtitle">Enterprise Developer Metrics & Cache-Backed Behavioral Archetyping</p>

    <form id="search-form" class="search-box">
        <input type="text" id="username-input" placeholder="Search GitHub profile..." required />
        <button type="submit" id="submit-btn">Analyze Target</button>
    </form>

    <div id="error-display"></div>
    <div id="results-container"></div>

    <div class="table-container">
        <h3 style="margin: 0 0 20px 0; font-size: 1.2rem; color: #FFF;">🟢 Database Cached Matrix Index</h3>
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Primary Stack</th>
                    <th>Repositories</th>
                    <th>Followers</th>
                    <th>Calculated Analytics Tag</th>
                </tr>
            </thead>
            <tbody id="profiles-table-body">
                <tr><td colspan="5" class="loading">Establishing data synchronization connection...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Set to relative pathing so it maps perfectly across Vercel deployments
    const API_BASE_URL = window.location.origin;

    document.addEventListener('DOMContentLoaded', () => {
        fetchSavedProfiles();

        const searchForm = document.getElementById('search-form');
        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username-input');
            const username = usernameInput.value.trim();
            if (username) {
                await analyzeProfile(username);
            }
        });
    });

    async function analyzeProfile(username) {
        const submitButton = document.getElementById('submit-btn');
        const resultContainer = document.getElementById('results-container');
        const errorDisplay = document.getElementById('error-display');
        
        submitButton.disabled = true;
        errorDisplay.innerHTML = '';
        resultContainer.innerHTML = '<div class="loading">🔍 Querying user graph telemetry records...</div>';

        try {
            const response = await fetch(`/api/profiles/${encodeURIComponent(username)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.details || data.error || 'Server rejected request telemetry credentials.');
            }

            renderInsights(data.insights);
            fetchSavedProfiles(); 
        } catch (err) {
            console.error("Aggregation Fault:", err);
            resultContainer.innerHTML = '';
            errorDisplay.innerHTML = `
                <div class="error-box">
                    <strong>❌ Processing Error:</strong> ${err.message}
                </div>
            `;
        } finally {
            submitButton.disabled = false;
        }
    }

    async function fetchSavedProfiles() {
        const tableBody = document.getElementById('profiles-table-body');
        if (!tableBody) return;

        try {
           const response = await fetch(`/api/profiles`);
            if (!response.ok) throw new Error('Database telemetry stream rejected.');
            
            const data = await response.json();
            tableBody.innerHTML = '';

            if (!data.profiles || data.profiles.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding: 20px;">No cached profiles found inside cluster.</td></tr>';
                return;
            }

            data.profiles.forEach(p => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong style="color:#FFF;">${p.username}</strong></td>
                    <td><span class="badge">${p.primary_language}</span></td>
                    <td>${p.public_repos}</td>
                    <td>${p.followers}</td>
                    <td><span class="badge archetype">${p.user_type}</span></td>
                `;
                tableBody.appendChild(row);
            });
        } catch (err) {
            console.error("Sync Error:", err);
            tableBody.innerHTML = `<tr><td colspan="5" style="color:var(--error); text-align:center; padding: 20px;">⚠️ Error parsing database telemetry entries.</td></tr>`;
        }
    }

    function renderInsights(insights) {
        const resultContainer = document.getElementById('results-container');
        if (!resultContainer) return;

        resultContainer.innerHTML = `
            <div class="card">
                <div class="profile-header">
                    <img src="${insights.avatar || 'https://via.placeholder.com/150'}" alt="Avatar" class="avatar">
                    <div>
                        <h2 style="margin:0; font-size: 1.6rem; color:#FFF;">${insights.name || insights.username}</h2>
                        <p style="margin:6px 0 0 0; color:var(--text-muted); font-size: 0.95rem;">
                            Archetype: <span style="color:var(--accent); font-weight:600;">${insights.developer_archetype}</span>
                        </p>
                    </div>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric-item"><p>Repositories</p><h3>${insights.public_repositories}</h3></div>
                    <div class="metric-item"><p>Followers</p><h3>${insights.followers}</h3></div>
                    <div class="metric-item"><p>Primary Stack</p><h3>${insights.primary_language}</h3></div>
                    <div class="metric-item"><p>Commitment</p><h3>${insights.commitment_score}%</h3></div>
                </div>

                <div class="info-block">
                    <div class="section-title">🎯 Career Diagnostic</div>
                    <p><strong>Core Strength:</strong> ${insights.career_insights.strength}</p>
                    <p><strong>Growth Area:</strong> ${insights.career_insights.weakness}</p>
                </div>

                <div class="info-block">
                    <div class="section-title">🚀 Recommended Path Roadmap</div>
                    <ul>
                        ${insights.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
