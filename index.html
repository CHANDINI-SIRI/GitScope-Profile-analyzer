<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitScope Profile Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; }
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .metric-card { background: rgba(21, 29, 47, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen py-10 px-4 font-sans">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight text-white">GitScope Profile Engine</h1>
            <p class="text-sm text-blue-400 font-medium tracking-wide">Enterprise Developer Metrics & Cache-Backed Behavioral Archetyping</p>
        </div>

        <div class="glass-panel p-4 rounded-2xl shadow-xl">
            <form id="searchForm" class="flex gap-3">
                <input type="text" id="usernameInput" placeholder="Search GitHub profile..." required
                    class="flex-1 bg-[#161b26] text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition text-sm">
                <button type="submit" id="searchBtn"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-3 rounded-xl transition duration-200 text-sm whitespace-nowrap shadow-lg shadow-indigo-600/20">
                    Analyze Target
                </button>
            </form>
        </div>

        <div id="statusBanner" class="hidden p-4 rounded-xl text-sm font-medium border"></div>

        <div id="resultsPanel" class="hidden glass-panel p-6 rounded-2xl shadow-xl space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-800 pb-5">
                <div class="flex items-center gap-4">
                    <img id="userAvatar" src="" alt="Avatar" class="w-16 h-16 rounded-2xl border-2 border-green-500 object-cover bg-gray-800">
                    <div>
                        <h2 id="profileName" class="text-2xl font-bold text-white"></h2>
                        <span id="profileArchetypeTag" class="inline-block mt-1 bg-gray-800 text-gray-400 text-[10px] font-black tracking-widest uppercase px-2.5 py-1 rounded-md border border-gray-700"></span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="metric-card p-4 rounded-xl text-center">
                    <div id="metricRepos" class="text-3xl font-extrabold text-white">0</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">Repositories</div>
                </div>
                <div class="metric-card p-4 rounded-xl text-center">
                    <div id="metricStars" class="text-3xl font-extrabold text-amber-400">0</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">Total Stars ⭐️</div>
                </div>
                <div class="metric-card p-4 rounded-xl text-center">
                    <div id="metricStack" class="text-xl font-extrabold text-cyan-400 truncate pt-1">Unknown</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-2">Primary Stack 💻</div>
                </div>
                <div class="metric-card p-4 rounded-xl text-center">
                    <div id="metricTrend" class="text-3xl font-extrabold text-emerald-400">0%</div>
                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mt-1">Commitment Trend</div>
                </div>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-2xl shadow-xl space-y-4">
            <h3 class="text-md font-bold text-white flex items-center gap-2 border-b border-gray-800 pb-4">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                Database Cached Matrix Index
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs border-collapse">
                    <thead>
                        <tr class="text-gray-400 uppercase text-[10px] tracking-wider border-b border-gray-800">
                            <th class="py-3 font-semibold">Username</th>
                            <th class="py-3 font-semibold">Primary Stack</th>
                            <th class="py-3 font-semibold">Repositories</th>
                            <th class="py-3 font-semibold">Followers</th>
                            <th class="py-3 font-semibold text-right">Calculated Analytics Tag</th>
                        </tr>
                    </thead>
                    <tbody id="matrixTableBody" class="divide-y divide-gray-800/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const usernameInput = document.getElementById('usernameInput');
        const searchBtn = document.getElementById('searchBtn');
        const statusBanner = document.getElementById('statusBanner');
        const resultsPanel = document.getElementById('resultsPanel');
        const matrixTableBody = document.getElementById('matrixTableBody');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            if(!username) return;

            showStatus("Analyzing telemetry profiles...", "info");
            searchBtn.disabled = true;

            try {
                const response = await fetch(`/api/profiles/${encodeURIComponent(username)}`, { method: 'POST' });
                const data = await response.json();

                if (!response.ok) throw new Error(data.details || data.error || "System ingestion error.");

                const insights = data.insights;
                document.getElementById('userAvatar').src = insights.avatar || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150';
                document.getElementById('profileName').innerText = insights.name || insights.username;
                document.getElementById('profileArchetypeTag').innerText = insights.developer_archetype;
                document.getElementById('metricRepos').innerText = insights.public_repositories;
                document.getElementById('metricStars').innerText = insights.total_stars_accumulated;
                document.getElementById('metricStack').innerText = insights.primary_language || 'Unknown';
                document.getElementById('metricTrend').innerText = `${insights.commitment_score}%`;

                resultsPanel.classList.remove('hidden');
                hideStatus();
                fetchSavedProfiles();
            } catch (err) {
                showStatus(`Error: ${err.message}`, "error");
            } finally {
                searchBtn.disabled = false;
            }
        });

        async function fetchSavedProfiles() {
            try {
                const response = await fetch('/api/profiles');
                if(!response.ok) throw new Error("Database return structure error");
                const data = await response.json();
                renderTable(data.profiles || []);
            } catch(err) {
                matrixTableBody.innerHTML = `<tr><td colspan="5" class="py-4 text-center text-red-400 font-medium">⚠️ Error parsing database telemetry entries.</td></tr>`;
            }
        }

        function renderTable(profiles) {
            matrixTableBody.innerHTML = '';
            if(profiles.length === 0) {
                matrixTableBody.innerHTML = `<tr><td colspan="5" class="py-4 text-center text-gray-500">No records stored inside historical lookup data.</td></tr>`;
                return;
            }
            profiles.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition border-b border-gray-800/30";
                tr.innerHTML = `
                    <td class="py-3 font-semibold text-blue-400 cursor-pointer" onclick="document.getElementById('usernameInput').value='${p.username}'">${p.username}</td>
                    <td class="py-3 text-gray-300">${p.primary_language}</td>
                    <td class="py-3 text-gray-300">${p.public_repos}</td>
                    <td class="py-3 text-gray-300">${p.followers}</td>
                    <td class="py-3 text-right">
                        <span class="inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider bg-blue-950/60 text-blue-400 border border-blue-800">
                            ${p.user_type}
                        </span>
                    </td>
                `;
                matrixTableBody.appendChild(tr);
            });
        }

        function showStatus(msg, type) {
            statusBanner.innerText = msg;
            statusBanner.classList.remove('hidden');
            statusBanner.className = `p-4 rounded-xl text-sm font-medium border ${type === 'info' ? 'bg-blue-950/50 text-blue-400 border-blue-800' : 'bg-red-950/50 text-red-400 border-red-900'}`;
        }
        function hideStatus() { statusBanner.classList.add('hidden'); }

        window.addEventListener('DOMContentLoaded', fetchSavedProfiles);
    </script>
</body>
</html>
